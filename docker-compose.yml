version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: feedback_hub_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin}
      POSTGRES_DB: ${DB_NAME:-feedback_hub}
    ports:
      - '5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-feedback_hub}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
